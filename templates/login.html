<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>NEXOVA LeadDesk</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
</head>
<body class="login-page">
  <div class="login-card">
    <div class="login-logo">
      <div class="login-wordmark">NEXOVA</div>
      <div class="login-sub">LeadDesk</div>
    </div>

    {% if error %}
      <div class="alert alert-error">{{ error }}</div>
    {% endif %}

    <form method="POST" action="/">
      <div class="form-group" style="margin-bottom:0.75rem;">
        <label>Username</label>
        <input type="text" name="username" placeholder="user1 or user2" required autocomplete="username" />
      </div>
      <div class="form-group" style="margin-bottom:1rem;">
        <label>Password</label>
        <input type="password" name="password" placeholder="••••••••••" required autocomplete="current-password" />
      </div>
      <button type="submit" class="btn btn-primary btn-full">Sign In</button>
    </form>

    <p class="login-hint">user1 / password123</p>
  </div>
</body>
</html>
